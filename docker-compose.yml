# Style Forge - 自建服务器 Docker Compose 部署

services:
  # === Nginx：静态文件服务 + 反向代理 ===
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: style-forge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL 证书（通过 certbot 获取）
      - ./ssl:/etc/nginx/ssl:ro
      # Let's Encrypt 验证
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      placeholder:
        condition: service_healthy
    networks:
      - style-forge

  # === 占位图 SVG 生成服务 ===
  placeholder:
    image: node:22-alpine
    container_name: style-forge-placeholder
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./server:/app/server:ro
    environment:
      - PLACEHOLDER_PORT=3001
      - PLACEHOLDER_HOST=0.0.0.0
    command: node server/placeholder.mjs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - style-forge

networks:
  style-forge:
    driver: bridge
