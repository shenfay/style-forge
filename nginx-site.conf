# Style Forge - 原生部署 Nginx 站点配置
# 适用于直接安装 Nginx，不使用 Docker
#
# 使用方式：
#   sudo ln -sf /path/to/style-forge/nginx-site.conf /etc/nginx/sites-available/style.atmedia.fun
#   sudo ln -sf /etc/nginx/sites-available/style.atmedia.fun /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name style.atmedia.fun;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name style.atmedia.fun;

    # SSL 证书（certbot 自动管理）
    ssl_certificate     /etc/letsencrypt/live/style.atmedia.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/style.atmedia.fun/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 安全头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               image/svg+xml;

    root /var/www/style.atmedia.fun;
    index index.html;

    # 静态文件缓存（哈希文件名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location = /favicon.svg  { expires 1y; access_log off; }
    location = /robots.txt   { expires 1d; access_log off; }
    location = /sitemap.xml  { expires 1d; access_log off; }
    location = /og-image.png { expires 1y; access_log off; }

    # 占位图 → 转发到本地 Node.js 服务
    location /placeholder {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        # 无 width 参数时走 SPA
        if ($arg_width = "") {
            rewrite ^ /index.html last;
        }
    }

    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # SPA 路由
    location / {
        try_files $uri $uri/ /index.html;

        location ~ \.html$ {
            expires -1;
            add_header Cache-Control "no-store, must-revalidate";
        }
    }
}
