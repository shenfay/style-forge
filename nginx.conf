# Style Forge - 生产环境 Nginx 配置
# 适用于 Docker 部署或直接安装

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log main;
    error_log   /var/log/nginx/error.log warn;

    # 基础优化
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 4096;

    # Gzip 压缩
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # HTTP → HTTPS 重定向
    server {
        listen 80;
        listen [::]:80;
        server_name style.atmedia.fun;

        # Let's Encrypt 验证
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS 服务
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name style.atmedia.fun;

        # SSL 证书（通过 certbot 或手动配置）
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 安全头
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # 静态资源根目录
        root /usr/share/nginx/html;
        index index.html;

        # 静态文件缓存（哈希文件名，可长期缓存）
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # 静态资源（直接访问）
        location = /favicon.svg    { expires 1y; access_log off; }
        location = /robots.txt     { expires 1d; access_log off; }
        location = /sitemap.xml    { expires 1d; access_log off; }
        location = /og-image.png   { expires 1y; access_log off; }

        # 占位图服务 → 转发到 Node.js
        location /placeholder {
            proxy_pass http://placeholder:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;

            # 只转发带 width 参数的请求，其他让 SPA 处理
            if ($arg_width = "") {
                rewrite ^ /index.html last;
            }
        }

        # 占位图服务健康检查
        location = /health {
            proxy_pass http://placeholder:3001/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # SPA 路由：所有未匹配的路径返回 index.html
        location / {
            try_files $uri $uri/ /index.html;

            # HTML 文件不缓存（确保 SPA 更新后立即生效）
            location ~ \.html$ {
                expires -1;
                add_header Cache-Control "no-store, must-revalidate";
            }
        }
    }
}
